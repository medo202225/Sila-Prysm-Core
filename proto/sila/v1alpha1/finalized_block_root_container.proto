syntax = "proto3";

package sila.eth.v1alpha1;

option csharp_namespace = "Sila.Eth.v1alpha1";
option go_package = "github.com/sila-chain/Sila-Consensus-Core/v7/proto/sila/v1alpha1;eth";
option java_multiple_files = true;
option java_outer_classname = "FinalizedBlockRootContainerProto";
option java_package = "org.sila.eth.v1alpha1";
option php_namespace = "Sila\\Eth\\v1alpha1";

message FinalizedBlockRootContainer {
  bytes parent_root = 1;
  bytes child_root = 2;
}
