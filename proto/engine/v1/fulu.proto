syntax = "proto3";

package sila.engine.v1;

import "proto/engine/v1/execution_engine.proto";

option csharp_namespace = "Sila.Engine.V1";
option go_package = "github.com/sila-chain/Sila-Consensus-Core/v7/proto/engine/v1;enginev1";
option java_multiple_files = true;
option java_outer_classname = "ElectraProto";
option java_package = "org.sila.engine.v1";
option php_namespace = "Sila\\Engine\\v1";

message ExecutionBundleFulu {
  ExecutionPayloadDeneb payload = 1;
  bytes value = 2;
  BlobsBundleV2 blobs_bundle = 3;
  bool should_override_builder = 4;
  repeated bytes execution_requests = 5;
}

message ExecutionBundleGloas {
  ExecutionPayloadGloas payload = 1;
  bytes value = 2;
  BlobsBundleV2 blobs_bundle = 3;
  bool should_override_builder = 4;
  repeated bytes execution_requests = 5;
}
