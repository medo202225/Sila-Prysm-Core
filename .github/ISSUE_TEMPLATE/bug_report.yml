name: Bug report
description: Report a bug or problem with running Sila
type: "Bug"
body:
  - type: markdown
    attributes:
      value: |
        Please search existing issues before submitting a new one.
        Existing issues may contain workarounds, resolutions, or progress updates.
  - type: textarea
    id: what-happened
    attributes:
      label: Describe the bug
      description: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: previous-version
    attributes:
      label: Has this worked before in a previous version?
      description: Did this behavior use to work in a previous version?
      render: text
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Minimal reproduction
      description: |
        Please describe how to reproduce this issue.
        Include the exact method used to run Sila and any beacon node or validator flags.
        Do not upload confidential files, secrets, or private keys.
      placeholder: |
        Steps to reproduce:

        1. Start '...'
        2. Then '...'
        3. Check '...'
        4. See error
  - type: textarea
    id: errors
    attributes:
      label: Error
      description: If the issue has logs or errors, share the relevant excerpt here.
      render: text
  - type: dropdown
    id: platform
    attributes:
      label: Platform(s)
      description: What platform(s) did this occur on?
      multiple: true
      options:
        - Linux (x86)
        - Linux (ARM)
        - Mac (Intel)
        - Mac (Apple Silicon)
        - Windows (x86)
        - Windows (ARM)
  - type: input
    attributes:
      label: What version of Sila are you running?
      description: Check your beacon node or validator with the `--version` flag.
  - type: textarea
    attributes:
      label: Anything else relevant?